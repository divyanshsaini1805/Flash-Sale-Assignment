# ===== Application =====
spring.application.name=FlashSaleEngine
server.port=8080

# ===== PostgreSQL Datasource =====
spring.datasource.url=jdbc:postgresql://localhost:5432/flashsale_db
spring.datasource.username=flashsale
spring.datasource.password=flashsale123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===== HikariCP Connection Pool (fast-fail on DB outage) =====
spring.datasource.hikari.connection-timeout=2000

# ===== File output path for internal workflow =====
flashsale.internal.output-dir=output/internal-orders

# ===== Execution time normalization =====
flashsale.target-execution-time-ms=200

# ===== JWT Configuration =====
# Base64-encoded 256-bit secret key for HMAC-SHA256
flashsale.jwt.secret=Zm1hc2hzYWxlLWVuZ2luZS1zdXBlci1zZWNyZXQta2V5LTIwMjYtZm9yLWp3dC1zaWduaW5n
# Token expiration: 15 minutes (900000ms)
flashsale.jwt.expiration-ms=900000

# ===== Resilience4j Circuit Breaker Config =====
resilience4j.circuitbreaker.instances.dbCircuitBreaker.sliding-window-size=3
resilience4j.circuitbreaker.instances.dbCircuitBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.dbCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.dbCircuitBreaker.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.dbCircuitBreaker.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.dbCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.dbCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.dbCircuitBreaker.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.dbCircuitBreaker.record-exceptions=java.lang.RuntimeException,org.springframework.dao.DataAccessException

# ===== Actuator =====
management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents
management.health.circuitbreakers.enabled=true
resilience4j.circuitbreaker.instances.dbCircuitBreaker.register-health-indicator=true
