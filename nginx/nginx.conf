upstream flashsale_backend {
    least_conn;
    server app-1:8080;
    server app-2:8080;
    server app-3:8080;
}

server {
    listen 80;
    server_name localhost;

    # Proxy all requests to the backend cluster
    location / {
        proxy_pass http://flashsale_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for flash sale traffic
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }

    # Health check endpoint for the load balancer itself
    location /nginx-health {
        return 200 'Nginx Load Balancer is up\n';
        add_header Content-Type text/plain;
    }
}
